<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter','Noto Sans TC',sans-serif;
background:#050507;
color:white;
overflow:hidden;
}

.app{
display:grid;
grid-template-columns:380px 1fr;
height:100vh;
}

/* 左側 */

.sidebar{
background:#08080c;
border-right:1px solid rgba(255,255,255,0.06);
padding:28px;
overflow-y:auto;
}

.logo{
display:flex;
align-items:center;
gap:16px;
margin-bottom:30px;
}

.logo-icon{
width:54px;
height:54px;
border-radius:18px;

background:
linear-gradient(
135deg,
#ff4fa3,
#ff69b8
);

display:flex;
align-items:center;
justify-content:center;

font-weight:900;
font-size:22px;
}

.logo-text strong{
display:block;
font-size:24px;
}

.logo-text span{
font-size:12px;
letter-spacing:2px;
color:#999;
}

.title{
font-size:30px;
font-weight:800;
margin-bottom:10px;
}

.subtitle{
color:#999;
line-height:1.8;
margin-bottom:30px;
}

.filter-tabs{
display:flex;
gap:10px;
margin-bottom:28px;
flex-wrap:wrap;
}

.tab{
padding:10px 16px;
border-radius:999px;

background:rgba(255,255,255,0.06);

font-size:14px;
}

.tab.active{
background:
linear-gradient(
135deg,
#ff4fa3,
#ff69b8
);
}

/* 玩家 */

.user-card{
background:rgba(255,255,255,0.06);

border:1px solid rgba(255,255,255,0.06);

border-radius:22px;

padding:20px;

margin-bottom:18px;

backdrop-filter:blur(12px);

transition:0.3s;
}

.user-card:hover{
transform:translateY(-4px);

border-color:
rgba(255,79,163,0.25);
}

.card-top{
display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:16px;
}

.user{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:54px;
height:54px;
border-radius:50%;

background:
linear-gradient(
135deg,
#ff4fa3,
#ff69b8
);

display:flex;
align-items:center;
justify-content:center;

font-weight:800;
}

.user-meta strong{
display:block;
margin-bottom:4px;
}

.online{
color:#39ff8d;
font-size:13px;
}

.distance{
font-size:13px;
color:#aaa;
}

.tag{
background:rgba(255,79,163,0.15);

padding:7px 12px;

border-radius:999px;

font-size:12px;

color:#ffd4e8;
}

.user-card p{
line-height:1.8;
color:#d1d1d1;

margin-bottom:16px;
}

.user-card button{
width:100%;

border:none;

padding:14px;

border-radius:14px;

background:
linear-gradient(
135deg,
#ff4fa3,
#ff69b8
);

color:white;

font-weight:700;

cursor:pointer;
}

/* 地圖 */

.map-area{
position:relative;
background:
url('https://images.unsplash.com/photo-1524661135-423995f22d0b?q=80&w=1974&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

.map-overlay{
position:absolute;
inset:0;

background:
linear-gradient(
to bottom,
rgba(5,5,10,0.4),
rgba(5,5,10,0.7)
);
}

/* 地圖點 */

.pin{
position:absolute;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
z-index:2;
}

.pin-dot{
width:22px;
height:22px;
border-radius:50%;

background:#ff4fa3;

box-shadow:
0 0 20px rgba(255,79,163,0.7);
}

.pin-card{
background:rgba(10,10,15,0.85);

border:1px solid rgba(255,255,255,0.08);

padding:14px 16px;

border-radius:18px;

backdrop-filter:blur(14px);

min-width:180px;
}

.pin-card strong{
display:block;
margin-bottom:6px;
}

.pin-card p{
font-size:13px;
color:#bbb;
line-height:1.6;
}

.pin1{
top:28%;
left:30%;
}

.pin2{
top:52%;
left:55%;
}

.pin3{
top:40%;
left:72%;
}

/* 上方資訊 */

.map-top{
position:absolute;
top:24px;
left:24px;
z-index:3;

background:rgba(10,10,15,0.72);

border:1px solid rgba(255,255,255,0.06);

padding:18px 22px;

border-radius:20px;

backdrop-filter:blur(12px);
}

.map-top h3{
margin-bottom:8px;
}

.map-top p{
color:#bbb;
font-size:14px;
}

/* 手機 */

@media(max-width:900px){

.app{
grid-template-columns:1fr;
}

.sidebar{
display:none;
}

}

</style>

</head>
