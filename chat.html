```html
<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>陪你玩｜聊天</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050507;
      color:white;
      font-family:'Inter','Noto Sans TC',sans-serif;
      overflow:hidden;
    }

    .app{
      display:grid;
      grid-template-columns:360px 1fr;
      height:100vh;
    }

    /* 左側聊天室 */

    .sidebar{
      border-right:1px solid rgba(255,255,255,0.06);
      background:#08080c;
      display:flex;
      flex-direction:column;
    }

    .sidebar-top{
      padding:28px 24px;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:24px;
    }

    .logo-icon{
      width:52px;
      height:52px;
      border-radius:18px;

      background:
      linear-gradient(
        135deg,
        #ff4fa3,
        #ff69b8
      );

      display:flex;
      align-items:center;
      justify-content:center;

      font-weight:900;
      font-size:20px;
    }

    .logo-text strong{
      display:block;
      font-size:24px;
    }

    .logo-text span{
      color:#999;
      font-size:12px;
      letter-spacing:2px;
    }

    .search{
      width:100%;
      padding:14px 16px;

      background:rgba(255,255,255,0.06);

      border:none;
      outline:none;

      border-radius:14px;

      color:white;
    }

    .chat-list{
      padding:16px;
      overflow-y:auto;
      flex:1;
    }

    .chat-item{
      display:flex;
      align-items:center;
      gap:14px;

      padding:16px;
      border-radius:18px;

      margin-bottom:10px;

      transition:0.3s;
      cursor:pointer;
    }

    .chat-item:hover{
      background:rgba(255,255,255,0.05);
    }

    .chat-item.active{
      background:
      linear-gradient(
        135deg,
        rgba(255,79,163,0.16),
        rgba(255,105,184,0.12)
      );

      border:1px solid rgba(255,79,163,0.18);
    }

    .avatar{
      width:56px;
      height:56px;
      border-radius:50%;

      background:
      linear-gradient(
        135deg,
        #ff4fa3,
        #ff69b8
      );

      display:flex;
      align-items:center;
      justify-content:center;

      font-weight:800;
      font-size:18px;

      position:relative;
    }

    .online-dot{
      position:absolute;
      right:0;
      bottom:0;

      width:14px;
      height:14px;

      border-radius:50%;

      background:#39ff8d;

      border:2px solid #08080c;
    }

    .chat-info strong{
      display:block;
      margin-bottom:6px;
      font-size:16px;
    }

    .chat-info p{
      color:#9d9d9d;
      font-size:14px;
    }

    /* 右側聊天 */

    .chat-room{
      display:flex;
      flex-direction:column;
      background:
      linear-gradient(
        to bottom,
        #09090f,
        #050507
      );
    }

    .chat-header{
      height:92px;

      border-bottom:1px solid rgba(255,255,255,0.06);

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:0 34px;

      backdrop-filter:blur(12px);
    }

    .chat-user{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .chat-user h3{
      margin-bottom:4px;
    }

    .chat-user span{
      color:#39ff8d;
      font-size:14px;
    }

    .location{
      color:#999;
      font-size:14px;
    }

    .messages{
      flex:1;
      overflow-y:auto;

      padding:40px;

      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .message{
      display:flex;
    }

    .message.left{
      justify-content:flex-start;
    }

    .message.right{
      justify-content:flex-end;
    }

    .bubble{
      max-width:420px;

      padding:16px 18px;

      border-radius:22px;

      line-height:1.8;

      font-size:15px;
    }

    .left .bubble{
      background:rgba(255,255,255,0.08);
      color:#e7e7e7;
    }

    .right .bubble{
      background:
      linear-gradient(
        135deg,
        #ff4fa3,
        #ff69b8
      );

      color:white;
    }

    .message-time{
      font-size:12px;
      color:#8f8f8f;
      margin-top:6px;
    }

    .input-area{
      padding:24px 30px;

      border-top:1px solid rgba(255,255,255,0.06);

      display:flex;
      gap:16px;
    }

    .message-input{
      flex:1;

      background:rgba(255,255,255,0.06);

      border:none;
      outline:none;

      border-radius:18px;

      padding:18px 20px;

      color:white;

      font-size:15px;
    }

    .send-btn{
      border:none;

      padding:0 28px;

      border-radius:18px;

      background:
      linear-gradient(
        135deg,
        #ff4fa3,
        #ff69b8
      );

      color:white;

      font-weight:700;

      cursor:pointer;
    }

    @media(max-width:900px){

      .app{
        grid-template-columns:1fr;
      }

      .sidebar{
        display:none;
      }

    }

  </style>

</head>

<body>

<div class="app">

  <!-- 左側 -->

  <div class="sidebar">

    <div class="sidebar-top">

      <div class="logo">

        <div class="logo-icon">
          P
        </div>

        <div class="logo-text">
          <strong>陪你玩</strong>
          <span>PYW NIGHTLIFE</span>
        </div>

      </div>

      <input class="search" placeholder="搜尋聊天..." />

    </div>

    <div class="chat-list">

      <div class="chat-item active">

        <div class="avatar">
          A
          <div class="online-dot"></div>
        </div>

        <div class="chat-info">
          <strong>Amy</strong>
          <p>今晚有空嗎？🍸</p>
        </div>

      </div>

      <div class="chat-item">

        <div class="avatar">
          K
          <div class="online-dot"></div>
        </div>

        <div class="chat-info">
          <strong>Kiki</strong>
          <p>等等去唱歌嗎 🎤</p>
        </div>

      </div>

      <div class="chat-item">

        <div class="avatar">
          M
          <div class="online-dot"></div>
        </div>

        <div class="chat-info">
          <strong>Mina</strong>
          <p>信義區新酒吧不錯</p>
        </div>

      </div>

    </div>

  </div>

  <!-- 右側 -->

  <div class="chat-room">

    <div class="chat-header">

      <div class="chat-user">

        <div class="avatar">
          A
          <div class="online-dot"></div>
        </div>

        <div>
          <h3>Amy</h3>
          <span>🟢 在線中</span>
        </div>

      </div>

      <div class="location">
        信義區 ・ 2km
      </div>

    </div>

    <div class="messages">

      <div class="message left">
        <div>
          <div class="bubble">
            今晚有空嗎？想去信義區喝一杯 🍸
          </div>
          <div class="message-time">
            21:14
          </div>
        </div>
      </div>

      <div class="message right">
        <div>
          <div class="bubble">
            可以呀～ 你想去哪間？
          </div>
          <div class="message-time">
            21:16
          </div>
        </div>
      </div>

      <div class="message left">
        <div>
          <div class="bubble">
            最近 ATT 那邊新開一間 Lounge 很不錯
          </div>
          <div class="message-time">
            21:18
          </div>
        </div>
      </div>

      <div class="message right">
        <div>
          <div class="bubble">
            好呀，我大概 20 分鐘能到 😆
          </div>
          <div class="message-time">
            21:19
          </div>
        </div>
      </div>

    </div>

    <div class="input-area">

      <input
        class="message-input"
        placeholder="輸入訊息..."
      />

      <button class="send-btn">
        傳送
      </button>

    </div>

  </div>

</div>

</body>

</html>
```
